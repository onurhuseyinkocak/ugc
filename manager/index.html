<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>UGC Manager · Onur Koçak</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f4f8ff; --card:#fff; --ink:#0e1726; --muted:#586379; --muted-2:#8b94a7;
      --border:#e6ecf5; --border-2:#d6deec; --brand:#2563eb; --brand-ink:#1b4ed1; --brand-soft:#eaf1ff;
      --new:#2563eb; --contacted:#b45309; --won:#15803d; --lost:#94a3b8; --radius:16px;
    }
    * { box-sizing:border-box; }
    [hidden] { display:none !important; } /* author display rules below would otherwise defeat the hidden attribute */
    body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.55 "Inter",system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    h1,h2 { font-family:"Plus Jakarta Sans",system-ui,sans-serif; margin:0; }
    a { color:var(--brand-ink); }
    .wrap { max-width:1120px; margin:0 auto; padding:24px 18px 60px; }

    /* login */
    .login { min-height:100dvh; display:grid; place-items:center; padding:24px; }
    .login-card { background:var(--card); border:1px solid var(--border); border-radius:22px; padding:34px 30px; width:100%; max-width:380px; box-shadow:0 24px 60px rgba(30,64,175,.12); text-align:center; }
    .login-card .mark { width:46px; height:46px; border-radius:12px; background:var(--brand); color:#fff; display:grid; place-items:center; font-weight:800; font-family:"Plus Jakarta Sans"; margin:0 auto 16px; }
    .login-card h1 { font-size:20px; } .login-card p { color:var(--muted); font-size:14px; margin:6px 0 20px; }
    .login-card input { width:100%; font:inherit; padding:13px 14px; border:1px solid var(--border-2); border-radius:12px; margin-bottom:12px; }
    .login-card input:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 4px var(--brand-soft); }
    .btn { font:inherit; font-weight:600; border:1px solid transparent; border-radius:12px; padding:12px 20px; cursor:pointer; background:var(--brand); color:#fff; transition:background .2s,transform .1s; }
    .btn:hover { background:var(--brand-ink); } .btn:active { transform:translateY(1px); }
    .btn:disabled { opacity:.6; cursor:default; }
    .btn-ghost { background:#fff; color:var(--muted); border-color:var(--border-2); }
    .btn-ghost:hover { background:#fff; color:var(--ink); border-color:var(--brand); }
    .err { color:#dc2626; font-size:13px; min-height:18px; margin:2px 0 0; }

    /* dashboard */
    .top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
    .top h1 { font-size:22px; } .top .sub { color:var(--muted); font-size:13px; }
    .top-actions { display:flex; gap:8px; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px; }
    .stat { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
    .stat b { font-family:"Plus Jakarta Sans"; font-size:28px; display:block; line-height:1.1; }
    .stat span { color:var(--muted); font-size:12.5px; }
    .tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .tab { font:inherit; font-size:13px; font-weight:500; padding:7px 14px; border-radius:999px; border:1px solid var(--border-2); background:#fff; color:var(--muted); cursor:pointer; }
    .tab.on { background:var(--brand); color:#fff; border-color:var(--brand); }

    .cards { display:grid; gap:12px; }
    .lead { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
    .lead-h { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .lead-h .who b { font-size:16px; } .lead-h .who span { color:var(--muted); font-size:13px; }
    .lead-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .badge { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:3px 9px; border-radius:999px; }
    .badge.booking { background:#eef2ff; color:#4338ca; } .badge.contact { background:#f1f5f9; color:#475569; }
    .badge.src { background:#ecfdf5; color:#047857; }
    .srcbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:-8px 0 18px; font-size:13px; color:var(--muted); }
    .srcbar .schip { background:#fff; border:1px solid var(--border); border-radius:999px; padding:4px 11px; font-weight:500; color:var(--ink); }
    .srcbar .schip b { color:var(--brand-ink); }
    .pill { font-size:11px; font-weight:700; text-transform:uppercase; padding:3px 9px; border-radius:999px; color:#fff; }
    .pill.new { background:var(--new); } .pill.contacted { background:var(--contacted); } .pill.won { background:var(--won); } .pill.lost { background:var(--lost); }
    .lead-body { margin-top:10px; display:grid; gap:4px; font-size:14px; }
    .lead-body .row { display:flex; gap:8px; } .lead-body .k { color:var(--muted-2); min-width:78px; flex-shrink:0; }
    .lead-foot { margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .lead-foot select { font:inherit; font-size:13px; padding:7px 10px; border:1px solid var(--border-2); border-radius:10px; background:#fff; }
    .lead-foot .date { color:var(--muted-2); font-size:12.5px; margin-left:auto; }
    .empty { text-align:center; color:var(--muted); padding:48px 0; }
    .clicks-panel { margin-top:30px; }
    .panel-h { font-family:"Plus Jakarta Sans",sans-serif; font-size:17px; margin:0 0 12px; }
    .clk-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
    .clk { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; display:grid; gap:2px; }
    .clk b { font-family:"Plus Jakarta Sans",sans-serif; font-size:24px; line-height:1.1; }
    .clk-t { font-size:13px; font-weight:600; color:var(--brand-ink); text-transform:capitalize; }
    .clk-7 { font-size:11.5px; color:var(--muted-2); }
    @media (max-width:640px){ .stats{ grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login" id="login">
    <form class="login-card" id="loginForm">
      <div class="mark">OK</div>
      <h1>UGC Manager</h1>
      <p>Onur Koçak · lead inbox</p>
      <input type="password" id="pw" placeholder="Password" autocomplete="current-password" autofocus />
      <button class="btn" style="width:100%" type="submit" id="loginBtn">Unlock</button>
      <p class="err" id="loginErr"></p>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div class="wrap" id="dash" hidden>
    <div class="top">
      <div>
        <h1>UGC Leads</h1>
        <div class="sub" id="sub">—</div>
      </div>
      <div class="top-actions">
        <button class="btn btn-ghost" id="refreshBtn">Refresh</button>
        <button class="btn btn-ghost" id="logoutBtn">Log out</button>
      </div>
    </div>
    <div class="stats" id="statCards"></div>
    <div class="srcbar" id="srcbar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="cards" id="cards"></div>
    <div class="clicks-panel" id="clicksPanel" hidden></div>
  </div>

  <script>
    var ENDPOINT = "https://bajrnvusqzllvsvipitr.supabase.co/functions/v1/ugc-lead";
    var ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhanJudnVzcXpsbHZzdmlwaXRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzMwNDQsImV4cCI6MjA4OTQwOTA0NH0.ao8f5YlNpbDnVdty5O6QwJaTSQS5cV8VEx2OE8gRa1k";
    var PW = null, ALL = [], FILTER = "all";

    function api(payload) {
      return fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json", apikey: ANON, Authorization: "Bearer " + ANON },
        body: JSON.stringify(payload),
      }).then(function (r) { return r.json().catch(function () { return {}; }).then(function (j) { return { status: r.status, j: j }; }); });
    }

    function esc(s) { return String(s == null ? "" : s).replace(/[<>&"]/g, function (c) { return ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" })[c]; }); }
    function fmtDate(iso) { try { var d = new Date(iso); return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" }) + " " + d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }); } catch (e) { return ""; } }

    function statCard(n, label) { return '<div class="stat"><b>' + n + '</b><span>' + label + '</span></div>'; }

    function render() {
      var c = ALL.counts || {};
      document.getElementById("statCards").innerHTML =
        statCard(c.total || 0, "Total leads") + statCard(c.new || 0, "New / unhandled") +
        statCard(c.booking || 0, "Call requests") + statCard(c.won || 0, "Won");
      // leads-by-source summary (which channel actually brings deals)
      var bySrc = {};
      (ALL.leads || []).forEach(function (l) { var s = l.channel || "Unknown"; bySrc[s] = (bySrc[s] || 0) + 1; });
      var srcKeys = Object.keys(bySrc).sort(function (a, b) { return bySrc[b] - bySrc[a]; });
      document.getElementById("srcbar").innerHTML = srcKeys.length
        ? "<span>Sources:</span>" + srcKeys.map(function (s) { return '<span class="schip">' + esc(s) + " <b>" + bySrc[s] + "</b></span>"; }).join("")
        : "";
      var tabsDef = [["all", "All"], ["new", "New"], ["contacted", "Contacted"], ["won", "Won"], ["lost", "Lost"]];
      document.getElementById("tabs").innerHTML = tabsDef.map(function (t) {
        return '<button class="tab' + (FILTER === t[0] ? " on" : "") + '" data-f="' + t[0] + '">' + t[1] + "</button>";
      }).join("");
      var rows = (ALL.leads || []).filter(function (l) { return FILTER === "all" || l.status === FILTER; });
      var box = document.getElementById("cards");
      if (!rows.length) { box.innerHTML = '<div class="empty">No leads here yet.</div>'; return; }
      box.innerHTML = rows.map(function (l) {
        var body = [["Product", l.product], ["Goal", l.goal], ["Company", l.company], ["Message", l.message], ["Timeframe", l.timeframe], ["Budget", l.budget]]
          .filter(function (r) { return r[1]; })
          .map(function (r) { return '<div class="row"><span class="k">' + r[0] + '</span><span>' + esc(r[1]) + "</span></div>"; }).join("");
        var subj = encodeURIComponent("Re: UGC for " + (l.product || "your product"));
        return '<div class="lead">' +
          '<div class="lead-h"><div class="who"><b>' + esc(l.name || "(no name)") + "</b> " +
          '<span>&lt;' + esc(l.email) + "&gt;</span></div>" +
          '<div class="lead-meta">' + (l.channel ? '<span class="badge src">' + esc(l.channel) + "</span>" : "") +
          '<span class="badge ' + (l.kind === "booking" ? "booking" : "contact") + '">' + (l.kind === "booking" ? "Call request" : "Message") + "</span>" +
          '<span class="pill ' + esc(l.status) + '">' + esc(l.status) + "</span></div></div>" +
          '<div class="lead-body">' + body + "</div>" +
          '<div class="lead-foot">' +
          '<a class="btn btn-ghost" style="text-decoration:none;font-size:13px;padding:7px 14px" href="mailto:' + esc(l.email) + "?subject=" + subj + '">Reply</a>' +
          '<select data-id="' + l.id + '">' +
          ["new", "contacted", "won", "lost"].map(function (s) { return '<option value="' + s + '"' + (l.status === s ? " selected" : "") + ">" + s + "</option>"; }).join("") +
          "</select>" +
          '<span class="date">' + fmtDate(l.created_at) + "</span></div></div>";
      }).join("");
    }

    function load() {
      document.getElementById("sub").textContent = "Loading…";
      return api({ action: "list", password: PW }).then(function (res) {
        if (res.status === 401) { logout("Session expired — log in again."); return; }
        if (!res.j || !res.j.ok) { document.getElementById("sub").textContent = "Error loading leads."; return; }
        ALL = res.j;
        document.getElementById("sub").textContent = (ALL.counts.total || 0) + " leads · updated " + new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
        render();
      }).then(loadClicks);
    }

    function loadClicks() {
      return api({ action: "clicks", password: PW }).then(function (res) {
        var el = document.getElementById("clicksPanel");
        var t = (res.j && res.j.tools) || [];
        if (!t.length) { el.hidden = true; el.innerHTML = ""; return; }
        el.hidden = false;
        el.innerHTML = '<h2 class="panel-h">Affiliate clicks</h2><div class="clk-grid">' +
          t.map(function (x) { return '<div class="clk"><b>' + (x.total || 0) + '</b><span class="clk-t">' + esc(x.tool) + '</span><span class="clk-7">' + (x.last7 || 0) + ' in last 7d</span></div>'; }).join("") +
          "</div>";
      }).catch(function () {});
    }

    function showDash() { document.getElementById("login").hidden = true; document.getElementById("dash").hidden = false; }
    function logout(msg) {
      PW = null; try { sessionStorage.removeItem("ugc_pw"); } catch (e) {}
      document.getElementById("dash").hidden = true; document.getElementById("login").hidden = false;
      document.getElementById("loginErr").textContent = msg || "";
      document.getElementById("pw").value = "";
    }

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var pw = document.getElementById("pw").value;
      var btn = document.getElementById("loginBtn");
      var err = document.getElementById("loginErr");
      if (!pw) return;
      btn.disabled = true; err.textContent = ""; btn.textContent = "Checking…";
      api({ action: "list", password: pw }).then(function (res) {
        btn.disabled = false; btn.textContent = "Unlock";
        if (res.status === 401) { err.textContent = "Wrong password."; return; }
        if (!res.j || !res.j.ok) { err.textContent = "Server error. Try again."; return; }
        PW = pw; try { sessionStorage.setItem("ugc_pw", pw); } catch (e2) {}
        ALL = res.j; showDash();
        document.getElementById("sub").textContent = (ALL.counts.total || 0) + " leads · updated " + new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
        render(); loadClicks();
      }).catch(function () { btn.disabled = false; btn.textContent = "Unlock"; err.textContent = "Network error."; });
    });

    document.getElementById("refreshBtn").addEventListener("click", load);
    document.getElementById("logoutBtn").addEventListener("click", function () { logout(""); });
    document.getElementById("tabs").addEventListener("click", function (e) {
      var b = e.target.closest(".tab"); if (!b) return; FILTER = b.getAttribute("data-f"); render();
    });
    document.getElementById("cards").addEventListener("change", function (e) {
      var sel = e.target.closest("select[data-id]"); if (!sel) return;
      var id = sel.getAttribute("data-id"), status = sel.value;
      sel.disabled = true;
      api({ action: "status", password: PW, id: id, status: status }).then(function (res) {
        sel.disabled = false;
        if (res.j && res.j.ok) {
          var lead = (ALL.leads || []).find(function (l) { return l.id === id; });
          if (lead) { var prev = lead.status; lead.status = status;
            if (ALL.counts[prev] != null) ALL.counts[prev]--; if (ALL.counts[status] != null) ALL.counts[status]++; }
          render();
        }
      }).catch(function () { sel.disabled = false; });
    });

    // auto-resume session
    try { var saved = sessionStorage.getItem("ugc_pw"); if (saved) { PW = saved; showDash(); load(); } } catch (e) {}
  </script>
</body>
</html>
