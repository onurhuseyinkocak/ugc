name: Sync Instagram portfolio

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

permissions:
  contents: write

concurrency:
  group: instagram-portfolio-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out portfolio
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch verified Reels and insights
        env:
          INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
          INSTAGRAM_USER_ID: ${{ vars.INSTAGRAM_USER_ID }}
          INSTAGRAM_GRAPH_VERSION: ${{ vars.INSTAGRAM_GRAPH_VERSION }}
        run: node scripts/sync-instagram-portfolio.mjs

      - name: Commit only validated portfolio changes
        run: |
          git add assets/portfolio/manifest.json assets/portfolio/metrics.json assets/stats.json assets/portfolio/ig-*.jpg assets/video/ig-*.mp4
          if git diff --cached --quiet; then
            echo "Instagram portfolio is already current."
            exit 0
          fi
          git config user.name "ugc-portfolio-sync[bot]"
          git config user.email "ugc-portfolio-sync[bot]@users.noreply.github.com"
          git commit -m "chore: sync verified Instagram portfolio"
          git push
